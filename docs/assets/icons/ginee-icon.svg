<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ginee">
  <!-- Background — indigo card -->
  <rect width="64" height="64" rx="14" fill="#4f46e5"/>

  <!-- 7-cardinal team: 6 specialists arranged around a central orchestrator -->
  <!-- Spokes (orchestrator → specialists) -->
  <g stroke="rgba(255, 255, 255, 0.42)" stroke-width="1.2" stroke-linecap="round">
    <line x1="32" y1="32" x2="32" y2="12"/>
    <line x1="32" y1="32" x2="49.3" y2="22"/>
    <line x1="32" y1="32" x2="49.3" y2="42"/>
    <line x1="32" y1="32" x2="32" y2="52"/>
    <line x1="32" y1="32" x2="14.7" y2="42"/>
    <line x1="32" y1="32" x2="14.7" y2="22"/>
  </g>

  <!-- 6 specialist nodes (white) — 5 engineers + ai-engineer -->
  <g fill="#ffffff">
    <circle cx="32"   cy="12" r="3.6"/>
    <circle cx="49.3" cy="22" r="3.6"/>
    <circle cx="49.3" cy="42" r="3.6"/>
    <circle cx="32"   cy="52" r="3.6"/>
    <circle cx="14.7" cy="42" r="3.6"/>
    <circle cx="14.7" cy="22" r="3.6"/>
  </g>

  <!-- Orchestrator (team-lead) — amber accent -->
  <circle cx="32" cy="32" r="5.4" fill="#f59e0b"/>
</svg>
