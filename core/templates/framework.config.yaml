# engineering-team — framework.config.yaml template
# Per-project. Lives at local/framework.config.yaml. project-manager writes during discovery.
# Maps abstract concepts to concrete project file paths. Reference, never copy (D5/G5).
# Replace example values. Leave commented-out concepts when not present — do NOT invent paths.

# --- Source of truth ---

# Solution Architecture Document (requirements, constraints, components, data model, API, decisions). Owned by solution-architect.
architecture-doc: docs/architecture.md

# Design mockup (visual + behavioural client contract). Owned by frontend-engineer; reviewed by solution-architect. Comment out if none.
mockup: docs/mockup.html

# Standalone API contract document, when separated from architecture doc.
# api-contract: docs/api.md

# Operational work-breakdown document (per-phase items, milestones).
work-breakdown-doc: docs/WBS.md

# CI/CD integration guide (operational companion to architecture doc).
# ci-cd-integration-doc: docs/ci-cd-integration.md

# --- Change governance ---

adr-directory: docs/adr/             # Architecture Decision Records
cr-directory: docs/cr/               # Change Requests
diagrams-directory: docs/diagrams/   # C4 / sequence / deployment diagrams

# --- Task & workflow ---

todo: TODO                           # Repo-root TODO file (user-curated open items)
nested-todos-glob: "**/TODO"         # Glob for nested per-component TODOs; null if unused

# Project-instruction file (always-loaded surface). Path depends on adapter:
#   claude: CLAUDE.md | copilot: .github/copilot-instructions.md | cursor: .cursor/rules/*.mdc
#   codex:  AGENTS.md | generic: INSTRUCTIONS.md
project-instruction-file: CLAUDE.md

# --- Repository structure ---
# project-manager uses these to attribute paths to roles.
server-tier-path: backend/
client-tier-path: frontend/
infrastructure-path: infrastructure/
local-dev-path: dev_env/
testing-path: testing/
ci-workflows-path: .github/workflows/

# --- Stack identity (declarative summary; full detail in local/project-profile.md) ---

stack:
  server-language: <e.g. C# / TypeScript / Python / Go>
  server-framework: <e.g. ASP.NET Core / Express / FastAPI / Spring Boot>
  client-framework: <e.g. Angular / React / Vue / Svelte>
  data-store: <e.g. PostgreSQL / MongoDB / DynamoDB>
  real-time-mechanism: <SSE / WebSocket / change-stream / push>
  iac-tool: <Terraform / Pulumi / Bicep / none>
  ci-tool: <GitHub Actions / GitLab CI / Azure Pipelines / Jenkins / none>
  container-runtime: <Docker / Podman / none>

# --- Hard constraints (mirror of local/bindings.md → "Hard constraints") ---

constraints:
  hosting-cloud: <e.g. Azure / AWS / GCP / none>
  cost-cap-usd-per-month: <number or null>
  retention-days-minimum: <number or null>
  internal-only: <true | false>
  stateless-backend: <true | false>

# --- Tooling commands ---

# Local-dev startup command. project-manager surfaces this when asking for manual smoke.
local-dev-startup-command: pwsh -NoProfile -File dev_env/start.ps1

# Test-runner entry points (per core/roles/qa-engineer.md § Zero-setup rule for test runners).
test-runners:
  functional: testing/functional/run-tests.ps1
  e2e: testing/e2e/run-tests.ps1
  smoke: testing/smoke/run-smoke.ps1
  script-suite: testing/pester/run-pester.ps1
