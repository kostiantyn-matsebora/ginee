# ginee — framework.config.yaml template
# Path: local/framework.config.yaml. Authored by team-lead during discovery.
# Maps concept → concrete project paths. Per-block specs live in core/protocols/*.
# Replace example values; comment out concepts not present.

# --- Source of truth ---
architecture-doc: docs/architecture.md   # SAD — solution-architect owns
mockup: docs/mockup.html                 # frontend-engineer owns; SA reviews
# api-contract: docs/api.md              # omit when API lives in the SAD
work-breakdown-doc: docs/WBS.md          # team-lead owns
# ci-cd-integration-doc: docs/ci-cd-integration.md

# --- Visual source-of-truth blueprint-diff gate ---
# Phase 4 precondition for any dispatch touching the visual SoT.
# Defaults derive from `mockup:` when absent (type per extension; blueprint-ref=origin/main;
# scope-discriminator=block-glob; enabled=true). Override for non-trunk / Figma / image / video.
# Full spec: core/protocols/blueprint-diff-protocol.md.
# visual-source-of-truth:
#   type: html-mockup            # html-mockup | figma | image | video | other
#   path: docs/mockup.html
#   blueprint-ref: origin/main
#   scope-discriminator: block-glob   # block-glob | section-anchor | full-file | external
#   enabled: true

# --- Change governance ---
adr-directory: docs/adr/
cr-directory: docs/cr/
ui-directory: docs/ui/                   # comment out if absent; subject to doc-size-caps
diagrams-directory: docs/diagrams/

# --- Change-governance gating + opt-out ---
# Gates CR / ADR authorship BEFORE drafting. Per-task prefixes (cr: / nocr: / adr: / noadr:)
# override at dispatch time. Precedence: prefix > config > default; explicit-force > skip.
# Full spec: core/roles/team-lead.md § CR-gate + core/roles/solution-architect.md § ADR-gate.
change-governance:
  cr:
    enabled: true                        # false → skip-reason: config-disabled
    skip-when-issue-source: true         # issue IS the requirement record
  adr:
    enabled: true
    require-architectural-delta: true    # no delta-trigger match → skip
  prompt-before-create: non-trivial      # always | never | non-trivial

# --- Per-class doc-size caps ---
# Breach without `Optimized-By: ai-engineer` trailer fails the context-economy gate.
# Full spec: core/protocols/doc-size-caps.md.
# doc-size-caps:
#   adr:  { cap-bytes: 4096 }            # default 4096
#   cr:   { cap-bytes: 6144 }            # default 6144
#   ui:   { cap-bytes: 4096 }            # default 4096
#   # ui: disabled                       # opt out for this class

# --- Task & workflow ---
todo: TODO
nested-todos-glob: "**/TODO"             # null if unused
# Always-loaded project-instruction file — per adapter:
#   claude → CLAUDE.md · copilot → .github/copilot-instructions.md
#   cursor → .cursor/rules/*.mdc · codex → AGENTS.md · generic → INSTRUCTIONS.md
project-instruction-file: CLAUDE.md

# --- Repository structure ---
server-tier-path: backend/
client-tier-path: frontend/
infrastructure-path: infrastructure/
local-dev-path: dev_env/
testing-path: testing/
ci-workflows-path: .github/workflows/

# --- Stack identity --- (full detail in local/project-profile.md)
stack:
  server-language: <e.g. C# / TypeScript / Python / Go>
  server-framework: <e.g. ASP.NET Core / Express / FastAPI / Spring Boot>
  client-framework: <e.g. Angular / React / Vue / Svelte>
  data-store: <e.g. PostgreSQL / MongoDB / DynamoDB>
  real-time-mechanism: <SSE / WebSocket / change-stream / push>
  iac-tool: <Terraform / Pulumi / Bicep / none>
  ci-tool: <GitHub Actions / GitLab CI / Azure Pipelines / Jenkins / none>
  container-runtime: <Docker / Podman / none>

# --- Hard constraints --- (mirror of local/bindings.md → "Hard constraints")
constraints:
  hosting-cloud: <e.g. Azure / AWS / GCP / none>
  cost-cap-usd-per-month: <number or null>
  retention-days-minimum: <number or null>
  internal-only: <true | false>
  stateless-backend: <true | false>

# --- Tooling commands ---
local-dev-startup-command: pwsh -NoProfile -File dev_env/start.ps1

test-runners:                            # QA-owned only
  functional: testing/functional/run-tests.ps1
  e2e: testing/e2e/run-tests.ps1
  smoke: testing/smoke/run-smoke.ps1
  script-suite: testing/pester/run-pester.ps1

# --- DevOps script quality ---
# Spec: core/roles/devops-engineer.md § Script-quality obligation.
devops-scripts:
  tests-path: tests/                     # NOT QA's testing/ tree
  coverage-threshold: 90                 # line coverage on changed + added lines
  coverage-tool-bash: bashcov            # bashcov | kcov | null
  # coverage-grace: 2026-09-01           # adopter catch-up window (ISO date or issue-N)

# --- Backend unit-test coverage ---
# Spec: core/roles/backend-engineer.md § Coverage obligation.
unit-backend:
  # .NET: dotnet test --collect:"XPlat Code Coverage"
  # Node: npm test -- --coverage   ·   Python: pytest --cov=<pkg>   ·   Go: go test -cover ./...
  runner: dotnet test --collect:"XPlat Code Coverage"
  coverage-threshold: 90

# --- Project-doc index ---
# Adopter-declared classes; precedence over auto-detection. Full spec:
# core/protocols/index-protocol.md § Extension.
# index:
#   dir: local/index
#   classes:
#     - { name: rfc,     source-glob: docs/rfcs/*.md,     template: adr-index.idx }
#     - { name: runbook, source-glob: ops/runbooks/*.md,  template: novel }

# --- Automatic mode — post-PR CI watch ---
# Applies when auto: AND Mode 1. Spec: core/protocols/ci-watch.md.
automatic-mode:
  ci-watch: enabled                      # enabled | disabled
  ci-watch-policy: poll                  # poll | async | hybrid
  ci-watch-poll-seconds: 20
  ci-watch-timeout-minutes: 15
  ci-watch-sync-probe-minutes: 3         # hybrid only
  ci-watch-max-fix-cycles: 3
  ci-required-checks: strict             # strict | branch-protection-aware
  ci-auto-retry-flakes: true
  # ci-flake-patterns: ["<additional regex>"]

# --- Lifecycle mode (lite / default) ---
# `lite:` / `direct:` skips Phase 1-3; dispatches one named cardinal in Phase 4.
# CR / ADR / Phase 7 / Phase 8 gates remain. Spec: core/process/dispatch.md.
# lifecycle:
#   lite-mode:
#     default: false                     # repo-wide opt-in
#     label-trigger: false               # complexity:low + single role label → lite

# --- Delivery modes ---
# Per-task prefix (branch: / wt: / commit:) > Phase-3 answer > config > framework default
# (branch for issue/TODO-sourced; wt for freeform). Spec: core/protocols/delivery-modes.md.
# delivery:
#   default-mode: branch                 # branch | wt | commit

# --- QA pixel-check (optional Phase 5 visual oracle) ---
# Visual diff app vs mockup at shared seed-state. Off by default.
# Requires local/bindings.md § Visual oracle fields when enabled.
# Spec: core/protocols/pixel-check-protocol.md.
# qa:
#   pixel-check:
#     enabled: false
#     alignment: mockup-follows-seed     # mockup-follows-seed | seed-follows-mockup
#     tolerance:
#       max-diff-pixels: 100
#       max-diff-ratio: 0.001
#       mask-regions:                    # selector + `# why: <reason>` per entry
#         - { selector: ".timestamp",          }  # why: non-deterministic wall-clock
#         - { selector: "[data-pixel-ignore]", }  # why: adopter opt-out marker
#     viewports:
#       - { name: desktop, width: 1440, height: 900 }
#       - { name: mobile,  width: 390,  height: 844 }

# --- Triage scoring ---
# H/M/L (ATAM). Spec: core/protocols/triage-scoring.md.
triage:
  scoring-formula: value-over-complexity  # value-over-complexity | value-only | value-minus-complexity

# --- Per-role + per-task model tier ---
# Resolution per dispatch (stop at first match): per-task prefix `model:<tier>` >
# Phase-3 answer > model-tier.per-role.<role> > core/roles/<role>.md frontmatter `default-tier:`.
# model-tier:
#   per-role:
#     team-lead: reasoning
#     solution-architect: reasoning
#     ai-engineer: standard
#     backend-engineer: standard
#     frontend-engineer: standard
#     devops-engineer: standard
#     qa-engineer: standard
#   adapters:
#     claude:
#       reasoning: claude-opus-4-7
#       standard:  claude-sonnet-4-6
#       fast:      claude-haiku-4-5-20251001
#     # Non-Claude adapters today: no programmatic per-role selection — install emits warning;
#     # per-task model:<tier> prefix documented as user-side hint.
#     copilot-cli: {}
#     agents-md:   {}
#     generic:     {}

# --- Compliance playbook opt-outs ---
# Per-tactic opt-out for Claude compliance playbook. Absent → all enabled.
# Tactic ids: subagent-tools-whitelist (T1) · pretooluse-edit-hook (T2) ·
# pretooluse-bash-hook (T3) · compliance-statusline (T4).
# compliance:
#   disabled:
#     - subagent-tools-whitelist

# --- Host capability tools ---
# Team-lead surfaces matching tools from the active adapter's install.md § Specialist-tool
# affinity table as dispatch hints. "Prefer if available", not "must use".
capability-tools:
  enabled: true                          # false → disable affinity injection repo-wide
  # disabled: [frontend-design]          # scope-out specific tools
  # required-context:                    # force-required pairs (rare; off by default)
  #   - { tool: security-review, role: solution-architect, task: ".*security.*" }

# --- Sub-issue dispatch tracking ---
# Each team-lead → cardinal dispatch lands as a GitHub sub-issue. Active only on issue-sourced.
# Resolution (stop at first match): `notrack:` prefix > `ginee:track:off` parent label >
# `dispatch.tracking` below > framework default (sub-issues when github.repo set).
# Spec: core/protocols/github-integration.md § Sub-issue dispatch.
dispatch:
  tracking: sub-issues                   # sub-issues | in-context
  time-tracking: true
  # closing-label: ginee:done

# --- GitHub integration ---
# `repo` defaults to `git remote get-url origin`. `framework-repo` lets adopters file
# feedback against ginee upstream. Spec: core/protocols/github-integration.md.
github:
  # repo: <owner>/<repo>
  # framework-repo: <owner>/ginee
  ready-label: ginee:ready
  in-progress-label: ginee:in-progress
  blocked-label: ginee:blocked
