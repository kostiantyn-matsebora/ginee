# ginee — framework.config.yaml template
# Header:
#   - Path: local/framework.config.yaml.
#   - Authored by: team-lead (during discovery).
# Purpose:
#   - Map abstract concepts → concrete project file paths.
#   - Reference, never copy (D5/G5).
# Usage:
#   - Replace example values.
#   - Leave commented-out concepts when not present.
#   - Do NOT invent paths.

# --- Source of truth ---
architecture-doc: docs/architecture.md
# SAD — System Architecture Document.
#   - Requirements.
#   - Constraints.
#   - Components.
#   - Data model.
#   - API.
#   - Decisions.
#   - Owner: solution-architect.
mockup: docs/mockup.html
# Mockup.
#   - Visual + behavioural client contract.
#   - Owner: frontend-engineer.
#   - Reviewed by: solution-architect.
#   - Comment out if none.
# api-contract: docs/api.md
#   - Standalone API contract.
#   - Omit when API lives inside the SAD.
work-breakdown-doc: docs/WBS.md
# WBS — Operational work-breakdown.
#   - Per-phase items.
#   - Milestones.
# ci-cd-integration-doc: docs/ci-cd-integration.md
#   - Operational companion to the SAD.

# --- Change governance ---
adr-directory: docs/adr/
# ADRs — Architecture Decision Records.
cr-directory: docs/cr/
# CRs — Change Requests.
diagrams-directory: docs/diagrams/
# Diagrams.
#   - C4.
#   - Sequence.
#   - Deployment.

# --- Task & workflow ---
todo: TODO
# Repo-root TODO file.
#   - User-curated open items.
nested-todos-glob: "**/TODO"
# Nested per-component TODOs.
#   - Glob.
#   - null if unused.
# Always-loaded project-instruction file — path varies per adapter:
#   - claude → CLAUDE.md
#   - copilot → .github/copilot-instructions.md
#   - cursor → .cursor/rules/*.mdc
#   - codex → AGENTS.md
#   - generic → INSTRUCTIONS.md
project-instruction-file: CLAUDE.md

# --- Repository structure ---
# Used by team-lead to attribute paths to roles.
server-tier-path: backend/
client-tier-path: frontend/
infrastructure-path: infrastructure/
local-dev-path: dev_env/
testing-path: testing/
ci-workflows-path: .github/workflows/

# --- Stack identity ---
# Declarative summary.
#   - Full detail in local/project-profile.md.
stack:
  server-language: <e.g. C# / TypeScript / Python / Go>
  server-framework: <e.g. ASP.NET Core / Express / FastAPI / Spring Boot>
  client-framework: <e.g. Angular / React / Vue / Svelte>
  data-store: <e.g. PostgreSQL / MongoDB / DynamoDB>
  real-time-mechanism: <SSE / WebSocket / change-stream / push>
  iac-tool: <Terraform / Pulumi / Bicep / none>
  ci-tool: <GitHub Actions / GitLab CI / Azure Pipelines / Jenkins / none>
  container-runtime: <Docker / Podman / none>

# --- Hard constraints ---
# Mirror of local/bindings.md → "Hard constraints".
constraints:
  hosting-cloud: <e.g. Azure / AWS / GCP / none>
  cost-cap-usd-per-month: <number or null>
  retention-days-minimum: <number or null>
  internal-only: <true | false>
  stateless-backend: <true | false>

# --- Tooling commands ---
local-dev-startup-command: pwsh -NoProfile -File dev_env/start.ps1
# Surfaced by team-lead when asking for manual smoke.

# Test-runner entry points.
#   - Per core/roles/qa-engineer.md § Zero-setup rule for test runners.
test-runners:
  functional: testing/functional/run-tests.ps1
  e2e: testing/e2e/run-tests.ps1
  smoke: testing/smoke/run-smoke.ps1
  script-suite: testing/pester/run-pester.ps1
  # script-suite above = QA-owned scripts only (seed / cleanup / smoke / scenario harness).
  # DevOps-owned scripts have their own keys below — see § DevOps script quality.

# --- DevOps script quality (D18) ---
# Lint + unit-test + coverage obligation for every devops-owned script change
# (PowerShell + bash). Spec: core/roles/devops-engineer.md § Script-quality
# obligation. Full migration: core/MIGRATIONS/D18-devops-script-quality.md.
devops-scripts:
  # Path containing devops-owned unit tests (Pester *.Tests.ps1 / *.bats).
  #   - NOT QA's testing/ tree.
  #   - Typically sibling tests/ next to each script root (e.g. dev_env/tests/,
  #     .github/actions/<name>/tests/).
  tests-path: tests/
  # Coverage threshold (line coverage on the changed + added line set).
  #   - Framework default: 90.
  #   - Adopter may raise (stricter) or lower (catch-up periods); any
  #     deviation visible in PR.
  coverage-threshold: 90
  # bash coverage tool (Pester is native via Invoke-Pester -CodeCoverage).
  #   - bashcov | kcov | null (skip when no bash scripts under devops).
  coverage-tool-bash: bashcov
  # Optional grace window — declare an adopter-wide catch-up period for
  # raising coverage on existing devops scripts. Format: ISO date or
  # backfill-tracking issue reference (e.g. "issue-42").
  # coverage-grace: 2026-09-01

# --- Backend unit-test coverage (D19) ---
# Coverage obligation for every backend source change. Spec:
# core/roles/backend-engineer.md § Coverage obligation.
# Migration: core/MIGRATIONS/D19-backend-coverage-floor.md.
unit-backend:
  # Backend unit-test runner invocation with coverage enabled.
  #   - .NET: dotnet test --collect:"XPlat Code Coverage"
  #   - Node: npm test -- --coverage
  #   - Python: pytest --cov=<pkg>
  #   - Go: go test -cover ./...
  #   - leave null when project has no backend tier yet.
  runner: dotnet test --collect:"XPlat Code Coverage"
  # Line coverage threshold on the changed + added line set.
  #   - Framework default: 90.
  #   - Adopter may raise (stricter) or lower (catch-up); deviation
  #     visible in local config + reviewable in PR.
  coverage-threshold: 90

# --- Project-doc index (D13) ---
# Adopter-declared index classes — pre-declare doc classes that the index
# layer should handle. Takes precedence over auto-detection. Full spec:
# core/protocols/index-protocol.md § Extension.
# Uncomment + adjust for your project's adopter-specific doc types.
# index:
#   dir: local/index
#   classes:
#     - name: rfc
#       source-glob: docs/rfcs/*.md
#       template: adr-index.idx           # reuse ADR template shape
#     - name: runbook
#       source-glob: ops/runbooks/*.md
#       template: novel                   # ai-engineer authors a new template

# --- Automatic mode — post-PR CI watch (D20) ---
# Behaviour after `gh pr create` in Mode 1 + auto mode. Spec:
# core/ci-watch.md. Migration: core/MIGRATIONS/D20-ci-watch.md.
#
# All keys optional — defaults shown. Apply only when auto mode is
# active AND the resolved delivery mode is Mode 1; otherwise ignored.
automatic-mode:
  ci-watch: enabled                       # enabled | disabled — set disabled to preserve pre-D20 behaviour
  ci-watch-policy: poll                   # poll | async | hybrid
  ci-watch-poll-seconds: 20               # interval for poll / hybrid sync phase
  ci-watch-timeout-minutes: 15            # max wall-clock per watch cycle before handback
  ci-watch-sync-probe-minutes: 3          # hybrid only: synchronous probe before falling through to async
  ci-watch-max-fix-cycles: 3              # cap on iterate-fix-recheck loops
  ci-required-checks: strict              # strict | branch-protection-aware
  ci-auto-retry-flakes: true              # rerun-failed once per cycle on flake-pattern match
  # ci-flake-patterns:                    # adopter-extensible; merged with framework defaults
  #   - "<additional regex>"

# --- Delivery modes (D17) ---
# Adopter-wide default for how PM lands task results. Per-task prefix
# (branch: / wt: / commit:) or Phase-3 user answer overrides. Full
# spec: core/delivery-modes.md.
#
# default-mode values:
#   branch   — Mode 1: feature branch + PR (recommended for multi-dev
#              repos; default for issue/TODO-sourced tasks if this key
#              is unset).
#   wt       — Mode 2: working-tree only; no commits.
#   commit   — Mode 3: commit-no-push on current branch.
#
# Commented out by default → framework defaults apply (branch for
# issue/TODO-sourced; wt for freeform).
# delivery:
#   default-mode: branch

# --- Triage scoring (D23) ---
# Ranks ready work in `ginee-triage` by a derived score from
# `value:high|medium|low` + `complexity:high|medium|low` labels (issues) /
# `☐ [v:H c:L] …` markers (TODOs). ATAM utility-tree convention; H=3, M=2, L=1.
# Spec: core/triage-scoring.md. Migration: core/MIGRATIONS/D23-triage-scoring.md.
# All keys optional — defaults shown.
triage:
  # Score formula:
  #   value-over-complexity (default)  →  value / complexity  (WSJF-style)
  #   value-only                       →  value
  #   value-minus-complexity           →  value - complexity
  scoring-formula: value-over-complexity

# --- Per-role + per-task model tier (D31) ---
# Routes reasoning-heavy roles to capable models and execution-heavy roles to
# cheaper ones. Tier names are vendor-neutral in core/; concrete model IDs live
# only in the per-adapter map below. Spec: core/MIGRATIONS/D31-model-tier.md.
#
# Resolution order (per dispatch) — stop at first match:
#   1. Per-task prefix  model:<tier>  in the dispatch line.
#   2. Phase-3 user answer.
#   3. model-tier.per-role.<role>  below.
#   4. core/roles/<role>.md frontmatter  default-tier:
#
# All keys optional — framework defaults apply when absent.
# model-tier:
#   per-role:
#     team-lead: reasoning
#     solution-architect: reasoning
#     ai-engineer: standard
#     backend-engineer: standard
#     frontend-engineer: standard
#     devops-engineer: standard
#     qa-engineer: standard
#   adapters:
#     claude:
#       reasoning: claude-opus-4-7
#       standard:  claude-sonnet-4-6
#       fast:      claude-haiku-4-5-20251001
#     # Other adapters: no programmatic per-role model selection today
#     # (model picked via the client's own UI). Install emits a one-line
#     # warning. Per-task  model:<tier>  prefix documented as user hint.
#     copilot-cli: {}
#     agents-md:   {}
#     generic:     {}

# --- Host capability tools (D38) ---
# Team-lead surfaces matching tools from the active adapter's
# install.md § Specialist-tool affinity table as dispatch hints. Specialist
# judgment never overruled — protocol is "prefer if available", not "must use".
# Full spec: core/MIGRATIONS/D38-host-capability-tools.md.
# All keys optional — defaults shown.
capability-tools:
  enabled: true                # set false to disable affinity injection repo-wide
  # disabled:                  # scope-out specific tools while keeping the rest
  #   - frontend-design
  # required-context:          # optional force-required pairs (rare; off by default)
  #   - tool: security-review
  #     role: solution-architect
  #     task: ".*security.*"   # regex against task description; force-surfaces when matched

# --- GitHub integration (D14) ---
# Lets team-lead pick up GitHub issues as a task source alongside
# TODO files + direct instructions, file new issues from user requests,
# and promote discussions to issues. Full spec: core/github-integration.md.
#
# Two repos:
#   repo            — primary (this adopter project). Defaults to `git remote get-url origin`.
#   framework-repo  — upstream ginee framework. Lets adopters file feedback
#                     against the framework with `@team-lead file framework-bug`
#                     / `file framework-feature` / `pick up framework#<N>`.
#                     Set during install (curl/tarball script populates it from the
#                     install source); override for forks.
#                     Leave unset to disable framework-targeted operations entirely.
# Labels are configurable; PM creates missing ones on first use (default color).
github:
  # repo: <owner>/<repo>
  # framework-repo: <owner>/ginee
  ready-label: ginee:ready
  in-progress-label: ginee:in-progress
  blocked-label: ginee:blocked
