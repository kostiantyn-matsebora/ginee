name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Build tarballs + verify framework integrity
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag + version
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"        >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG version=$VERSION"

      - name: Verify core/VERSION matches tag
        run: |
          CORE_VERSION="$(cat core/VERSION | tr -d '[:space:]')"
          if [ "$CORE_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::core/VERSION ($CORE_VERSION) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Lint framework structure
        run: |
          set -e
          # Required directories
          for d in core core/roles core/templates migrations adapters adapters/_shared/agents adapters/claude adapters/copilot-cli adapters/agents-md adapters/generic extras/roles local; do
            if [ ! -d "$d" ]; then
              echo "::error::Missing required directory: $d"
              exit 1
            fi
          done
          # Required files
          for f in core/VERSION core/process.md README.md PLAN.md CLAUDE.md install.sh install.ps1 adapters/agents-md/AGENTS.md adapters/generic/INSTRUCTIONS.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done
          # 7 cardinal roles
          for role in team-lead solution-architect ai-engineer frontend-engineer backend-engineer devops-engineer qa-engineer; do
            if [ ! -f "core/roles/${role}.md" ]; then
              echo "::error::Missing cardinal role: core/roles/${role}.md"
              exit 1
            fi
            if [ ! -f "adapters/_shared/agents/${role}.md" ]; then
              echo "::error::Missing shared pointer: adapters/_shared/agents/${role}.md"
              exit 1
            fi
          done
          # Specialists
          for sp in security-engineer ml-engineer mobile-engineer sre data-engineer; do
            if [ ! -f "extras/roles/${sp}.md" ]; then
              echo "::error::Missing specialist: extras/roles/${sp}.md"
              exit 1
            fi
          done
          # Cross-reference sanity: every shared pointer cites core/roles/
          for f in adapters/_shared/agents/*.md; do
            role="$(basename "$f" .md)"
            if ! grep -q "core/roles/${role}.md" "$f"; then
              echo "::error::Pointer $f does not cite core/roles/${role}.md"
              exit 1
            fi
          done
          echo "Framework structure: OK"

      - name: Build tarball + zip
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PKG="ginee-${TAG}"
          mkdir -p _dist
          # Stage a clean copy. Exclude list mirrors install.sh's prune list so
          # the released tarball ships "ready to use" — no adopter-side pruning
          # needed for tagged installs.
          mkdir -p "_stage/${PKG}"
          # rsync --exclude 'X' is BASENAME-match — any dir named X anywhere.
          # Anchor framework-self-dev top-levels (tests/ hooks/) with leading '/'
          # so adopter-side adapters/claude/hooks/ and core/scripts/ survive.
          rsync -a \
            --exclude '_dist' --exclude '_stage' \
            --exclude '.git' --exclude '.github' --exclude '.claude' \
            --exclude '.gitignore' --exclude '.dockerignore' \
            --exclude 'install.sh' --exclude 'install.ps1' \
            --exclude 'PLAN.md' --exclude 'CLAUDE.md' --exclude 'README.md' --exclude 'SECURITY.md' \
            --exclude 'docs' \
            --exclude 'migrations' --exclude 'core/MIGRATIONS' \
            --exclude '/tests' --exclude '/hooks' \
            --exclude 'PSScriptAnalyzerSettings.psd1' \
            --exclude 'local/*' \
            ./ "_stage/${PKG}/"
          # Preserve empty local/roles/ so consumers see the structure
          mkdir -p "_stage/${PKG}/local/roles"
          touch "_stage/${PKG}/local/.gitkeep" "_stage/${PKG}/local/roles/.gitkeep"
          # Pack
          tar -C _stage -czf "_dist/${PKG}.tar.gz" "$PKG"
          (cd _stage && zip -qr "../_dist/${PKG}.zip" "$PKG")
          ls -lh _dist/

      - name: Verify staged tarball contents
        run: |
          set -e
          STAGE="_stage/ginee-${{ steps.version.outputs.tag }}"
          # Adopter-side hook files MUST ship — regression guard for the
          # rsync --exclude basename-match bug that stripped them in 0.20–0.22.
          # Updated for v0.24.0: extended with Tier 2 (T5/T6/T7/T8) + Tier 3
          # (T10 commands · T12 session-start · T13 attest-optimized-by) +
          # hook data YAMLs that ship under adapters/claude/hooks/.
          required=(
            # Tier 1 — PreToolUse hooks + statusline
            adapters/claude/hooks/pre-tool-use-edit.ps1
            adapters/claude/hooks/pre-tool-use-edit.sh
            adapters/claude/hooks/pre-tool-use-bash.ps1
            adapters/claude/hooks/pre-tool-use-bash.sh
            adapters/claude/statusline.ps1
            adapters/claude/statusline.sh
            # Tier 2 — T5 UserPromptSubmit · T6 PostToolUse · T7 Stop · T8 SendMessage
            adapters/claude/hooks/user-prompt-submit.ps1
            adapters/claude/hooks/user-prompt-submit.sh
            adapters/claude/hooks/post-tool-use-edit.ps1
            adapters/claude/hooks/post-tool-use-edit.sh
            adapters/claude/hooks/stop.ps1
            adapters/claude/hooks/stop.sh
            adapters/claude/hooks/pre-tool-use-send-message.ps1
            adapters/claude/hooks/pre-tool-use-send-message.sh
            # Tier 2/3 — hook data YAMLs
            adapters/claude/hooks/keyword-triggers.yaml
            adapters/claude/hooks/carry-forward-rules.yaml
            # Tier 3 — T10 slash commands (six deterministic templates)
            adapters/claude/commands/ginee-dispatch.md
            adapters/claude/commands/ginee-phase-report.md
            adapters/claude/commands/ginee-self-lint.md
            adapters/claude/commands/ginee-commit.md
            adapters/claude/commands/ginee-pr.md
            adapters/claude/commands/ginee-issue-pickup.md
            # Tier 3 — T12 SessionStart · T13 Optimized-By attestation
            adapters/claude/hooks/session-start.ps1
            adapters/claude/hooks/session-start.sh
            adapters/claude/hooks/attest-optimized-by.ps1
            adapters/claude/hooks/attest-optimized-by.sh
            # Installer + framework-self-dev gate
            core/scripts/sync-claude-settings.ps1
            core/scripts/sync-claude-settings.sh
            scripts/context-economy-check.ps1
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "${STAGE}/${f}" ]; then
              echo "::error::Staged tarball missing required adopter-side file: ${f}"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::${missing} required file(s) missing from staged tarball — refusing to publish."
            exit 1
          fi
          echo "Staged tarball: required adopter-side files OK"

      - name: Compute SHA256 sums
        run: |
          cd _dist
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artefacts
          path: _dist/

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-artefacts
          path: _dist

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.package.outputs.tag }}"
          NOTES_FILE=".github/release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "Release notes: $NOTES_FILE"
            gh release create "$TAG" \
              --title "ginee $TAG" \
              --notes-file "$NOTES_FILE" \
              _dist/*.tar.gz _dist/*.zip _dist/SHA256SUMS.txt
          else
            echo "::warning::No release notes at $NOTES_FILE — falling back to boilerplate. Author concise highlights at this path on the next Release PR."
            gh release create "$TAG" \
              --title "ginee $TAG" \
              --notes "Release ${TAG}. See [PLAN.md](PLAN.md) for design + locked decisions, and [README.md](README.md) for install instructions." \
              _dist/*.tar.gz _dist/*.zip _dist/SHA256SUMS.txt
          fi
