name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate framework structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required directories
        run: |
          set -e
          for d in \
            core \
            core/roles \
            core/templates \
            core/templates/index \
            core/templates/issues \
            migrations \
            core/skills \
            adapters \
            adapters/_shared/agents \
            adapters/claude \
            adapters/copilot-cli \
            adapters/agents-md \
            adapters/generic \
            extras/roles \
            local; do
            if [ ! -d "$d" ]; then
              echo "::error::Missing required directory: $d"
              exit 1
            fi
          done
          echo "Required directories: OK"

      - name: Required top-level files
        run: |
          set -e
          for f in \
            core/VERSION \
            core/process.md \
            core/protocols/index-protocol.md \
            core/protocols/index-syntax.md \
            core/protocols/github-integration.md \
            core/protocols/delivery-modes.md \
            core/protocols/iteration-protocol.md \
            core/protocols/automatic-mode.md \
            core/protocols/doc-roles.md \
            core/protocols/cross-domain-bugs.md \
            core/protocols/cross-agent-handoff.md \
            core/protocols/post-task-check-in.md \
            README.md \
            LICENSE \
            SECURITY.md \
            CLAUDE.md \
            PLAN.md \
            install.sh \
            install.ps1 \
            adapters/agents-md/AGENTS.md \
            adapters/generic/INSTRUCTIONS.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done
          echo "Required files: OK"

      - name: 7 cardinal role kernels present
        run: |
          set -e
          for role in team-lead solution-architect ai-engineer frontend-engineer backend-engineer devops-engineer qa-engineer; do
            if [ ! -f "core/roles/${role}.md" ]; then
              echo "::error::Missing cardinal role kernel: core/roles/${role}.md"
              exit 1
            fi
            if [ ! -f "adapters/_shared/agents/${role}.md" ]; then
              echo "::error::Missing shared subagent pointer: adapters/_shared/agents/${role}.md"
              exit 1
            fi
          done
          echo "7 cardinal roles: OK"

      - name: 5 specialist role kernels present
        run: |
          set -e
          for sp in security-engineer ml-engineer mobile-engineer sre data-engineer; do
            if [ ! -f "extras/roles/${sp}.md" ]; then
              echo "::error::Missing specialist: extras/roles/${sp}.md"
              exit 1
            fi
          done
          echo "5 specialists: OK"

      - name: 11 ginee-* skills present
        run: |
          set -e
          for skill in ginee-discovery ginee-rediscover ginee-pick-up ginee-triage ginee-file-bug ginee-file-feature ginee-file-framework-bug ginee-file-framework-feature ginee-promote-discussion ginee-reindex ginee-update; do
            if [ ! -f "core/skills/${skill}/SKILL.md" ]; then
              echo "::error::Missing skill: core/skills/${skill}/SKILL.md"
              exit 1
            fi
          done
          echo "11 ginee-* skills: OK"

      - name: Shared subagent pointers cite core/roles/
        run: |
          set -e
          for f in adapters/_shared/agents/*.md; do
            role="$(basename "$f" .md)"
            if ! grep -q "core/roles/${role}.md" "$f"; then
              echo "::error::Pointer $f does not cite core/roles/${role}.md"
              exit 1
            fi
          done
          echo "Subagent pointer cross-references: OK"

      - name: Brand consistency — no stray `engineering-team` (excluding history + legacy-migration contexts)
        run: |
          set -e
          # Allowed contexts (anything else is a regression):
          #  - D8 / D11 history notes in CLAUDE.md + PLAN.md
          #  - MIGRATIONS/* notes (per-release upgrade instructions)
          #  - docs/CHANGELOG.md (release notes for the rebrand entry)
          #  - install.ps1 + install.sh legacy-path migration code (renames .agents/engineering-team/ → .agents/ginee/)
          #  - core/scripts/migrate-engineering-team-to-ginee.{sh,ps1} (rename-migration script; explicit name is its purpose)
          #  - Adopter-facing docs explaining the legacy → new path migration (ARCHITECTURE, GETTING_STARTED troubleshooting row)
          #  - ci.yml itself (this workflow scans for the string — it appears in the scanning regex)
          hits=$(grep -rn "engineering-team" \
            --include="*.md" --include="*.yaml" --include="*.yml" --include="*.ps1" --include="*.sh" \
            --exclude="ci.yml" \
            --exclude-dir=.git --exclude-dir=node_modules \
            . 2>/dev/null \
            | grep -v "CLAUDE\.md.*D8\|CLAUDE\.md.*D11\|PLAN\.md.*D8\|PLAN\.md.*D11\|MIGRATIONS/\|docs/CHANGELOG\.md\|migrate-engineering-team-to-ginee\|engineering-team-renamed-ginee" \
            | grep -v -i "legacy\|pre-rebrand\|migrating\|migrate legacy\|auto-rename\|rename once\|legacy install path\|legacy-path migration" \
            || true)
          if [ -n "$hits" ]; then
            echo "::error::Stray 'engineering-team' references outside allowed history / legacy-migration contexts:"
            echo "$hits"
            exit 1
          fi
          echo "Brand consistency: OK"

      - name: Installer help comments are current
        run: |
          set -e
          # install.sh + install.ps1 should mention ginee + GINEE_* env vars, not ET_*
          if grep -q 'ET_ADAPTER\|ET_REF\|ET_TARGET\|ET_REPO\|ET_UPDATE_ONLY' install.sh install.ps1; then
            echo "::error::Stale ET_* env var reference in installer scripts (should be GINEE_*)"
            grep -n 'ET_ADAPTER\|ET_REF\|ET_TARGET\|ET_REPO\|ET_UPDATE_ONLY' install.sh install.ps1
            exit 1
          fi
          if ! grep -q 'GINEE_ADAPTER' install.ps1; then
            echo "::error::install.ps1 should reference GINEE_ADAPTER in its usage comments"
            exit 1
          fi
          echo "Installer help comments: OK"

  lint-powershell:
    name: PSScriptAnalyzer
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser
          Import-Module PSScriptAnalyzer
          (Get-Module PSScriptAnalyzer).Version | Out-String | Write-Host

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $findings = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          if ($findings) {
            $findings | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize -Wrap
            Write-Error "PSScriptAnalyzer found $($findings.Count) issue(s) — see CLAUDE.md § Hard constraints"
            exit 1
          }
          Write-Host "PSScriptAnalyzer: clean"

  test-powershell:
    name: Pester tests
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Import-Module Pester -MinimumVersion 5.5.0
          (Get-Module Pester).Version | Out-String | Write-Host

      - name: Run Pester
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.TestResult.OutputPath = './pester-results.xml'
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

      - name: Upload Pester results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: pester-results.xml

  lint-bash:
    name: shellcheck
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck --version

      - name: Run shellcheck on all *.sh
        run: |
          set -e
          mapfile -t scripts < <(find . -type f -name '*.sh' \
            -not -path './.git/*' \
            -not -path './node_modules/*')
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No *.sh files found."
            exit 0
          fi
          printf '%s\n' "${scripts[@]}"
          shellcheck -x "${scripts[@]}"
          echo "shellcheck: clean"

  test-bash:
    name: bats tests
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats
          bats --version

      - name: Run bats
        run: |
          if ! ls tests/*.bats >/dev/null 2>&1; then
            echo "No tests/*.bats files found."
            exit 0
          fi
          bats tests/*.bats

  install-smoke-bash:
    name: Install smoke (bash, ${{ matrix.adapter }})
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter: [claude, copilot-cli, agents-md, generic]
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can push HEAD to the local bare repo
          # (shallow clones can't be pushed to a fresh repo).
          fetch-depth: 0

      - name: Set up local bare repo (installer git-clones the PR content)
        run: |
          set -e
          git init --bare /tmp/ginee-bare.git
          # protocol.file.allow=always required since git 2.38.1 hardening
          git -c protocol.file.allow=always push --force /tmp/ginee-bare.git HEAD:refs/heads/pr-test

      - name: Scaffold fake adopter project
        run: |
          set -e
          mkdir -p /tmp/fake-project
          cd /tmp/fake-project
          git init -q
          git config user.email ci@example.com
          git config user.name "CI"
          mkdir -p docs
          printf '# Fake project for ginee install smoke test\n' > README.md
          printf '# Architecture\n\nPlaceholder.\n' > docs/architecture.md
          printf -- '- [ ] First example task\n- [ ] Second example task\n' > TODO.md
          git add . && git commit -q -m "init"

      - name: Install via piped one-liner (recommended)
        run: |
          set -e
          # Mirrors the README `curl ... | bash -s -- ...` pattern; substitutes
          # the network fetch with the workspace install.sh.
          cat install.sh | bash -s -- \
            --target /tmp/fake-project \
            --adapter ${{ matrix.adapter }} \
            --ref pr-test \
            --repo /tmp/ginee-bare.git

      - name: Verify framework layout
        run: |
          set -e
          ROOT=/tmp/fake-project
          for d in core core/roles core/templates core/skills adapters adapters/_shared/agents extras/roles local; do
            [ -d "$ROOT/.agents/ginee/$d" ] || { echo "::error::Missing $ROOT/.agents/ginee/$d"; exit 1; }
          done
          [ -f "$ROOT/.agents/ginee/core/VERSION" ] || { echo "::error::Missing core/VERSION"; exit 1; }
          # Only the chosen adapter survives in adapters/ (per installer pruning)
          for d in "$ROOT/.agents/ginee/adapters"/*/; do
            name="$(basename "$d")"
            if [ "$name" != "_shared" ] && [ "$name" != "${{ matrix.adapter }}" ]; then
              echo "::error::Unchosen adapter '$name' should have been pruned"
              exit 1
            fi
          done
          echo "Framework layout: OK"

      - name: Verify adapter footprint + no stale legacy pointers
        run: |
          set -e
          ROOT=/tmp/fake-project
          case "${{ matrix.adapter }}" in
            claude)
              for role in team-lead solution-architect ai-engineer frontend-engineer backend-engineer devops-engineer qa-engineer; do
                [ -f "$ROOT/.claude/agents/${role}.md" ] || { echo "::error::Missing .claude/agents/${role}.md"; exit 1; }
              done
              [ ! -f "$ROOT/.claude/agents/project-manager.md" ] || { echo "::error::Legacy project-manager.md pointer should not exist"; exit 1; }
              for skill in ginee-discovery ginee-rediscover ginee-pick-up ginee-triage ginee-file-bug ginee-file-feature ginee-file-framework-bug ginee-file-framework-feature ginee-promote-discussion ginee-reindex ginee-update; do
                [ -f "$ROOT/.claude/skills/${skill}/SKILL.md" ] || { echo "::error::Missing .claude/skills/${skill}/SKILL.md"; exit 1; }
              done
              grep -qF "## Engineering team framework" "$ROOT/CLAUDE.md" || { echo "::error::CLAUDE.md missing pointer sentinel"; exit 1; }
              # Compliance playbook hooks — Tier 1 (T2/T3) + Tier 2 (T5/T6/T7/T8) + statusline (T4).
              for f in pre-tool-use-edit.ps1 pre-tool-use-edit.sh \
                       pre-tool-use-bash.ps1 pre-tool-use-bash.sh \
                       pre-tool-use-send-message.ps1 pre-tool-use-send-message.sh \
                       post-tool-use-edit.ps1 post-tool-use-edit.sh \
                       user-prompt-submit.ps1 user-prompt-submit.sh \
                       stop.ps1 stop.sh \
                       keyword-triggers.yaml carry-forward-rules.yaml; do
                [ -f "$ROOT/.agents/ginee/adapters/claude/hooks/${f}" ] \
                  || { echo "::error::Missing .agents/ginee/adapters/claude/hooks/${f}"; exit 1; }
              done
              for f in statusline.ps1 statusline.sh; do
                [ -f "$ROOT/.agents/ginee/adapters/claude/${f}" ] \
                  || { echo "::error::Missing .agents/ginee/adapters/claude/${f}"; exit 1; }
              done
              # sync-claude-settings.{ps1,sh} must survive install (under core/scripts/, not pruned).
              for f in sync-claude-settings.ps1 sync-claude-settings.sh; do
                [ -f "$ROOT/.agents/ginee/core/scripts/${f}" ] \
                  || { echo "::error::Missing .agents/ginee/core/scripts/${f}"; exit 1; }
              done
              # .claude/settings.json must be auto-wired with all hook entries.
              SETTINGS="$ROOT/.claude/settings.json"
              [ -f "$SETTINGS" ] || { echo "::error::Missing .claude/settings.json (sync-claude-settings did not run)"; exit 1; }
              if command -v jq >/dev/null 2>&1; then
                # PreToolUse: 4 entries (T2 Edit/Write/MultiEdit · T3 Bash · T8 SendMessage · T13 Bash attest-optimized-by).
                pretu="$(jq -r '.hooks.PreToolUse | length' "$SETTINGS")"
                [ "$pretu" = "4" ] || { echo "::error::Expected 4 PreToolUse entries, got $pretu"; exit 1; }
                jq -e 'any(.hooks.PreToolUse[]; .matcher == "Edit|Write|MultiEdit")' "$SETTINGS" >/dev/null \
                  || { echo "::error::Missing T2 PreToolUse Edit|Write|MultiEdit entry"; exit 1; }
                jq -e 'any(.hooks.PreToolUse[]?.hooks[]?; .command | test("pre-tool-use-bash"))' "$SETTINGS" >/dev/null \
                  || { echo "::error::Missing T3 PreToolUse Bash entry"; exit 1; }
                jq -e 'any(.hooks.PreToolUse[]; .matcher == "SendMessage")' "$SETTINGS" >/dev/null \
                  || { echo "::error::Missing T8 PreToolUse SendMessage entry"; exit 1; }
                jq -e 'any(.hooks.PreToolUse[]?.hooks[]?; .command | test("attest-optimized-by"))' "$SETTINGS" >/dev/null \
                  || { echo "::error::Missing T13 PreToolUse attest-optimized-by entry"; exit 1; }
                # PostToolUse: T6 only (context-economy-check is framework-self-dev — not wired in adopter settings).
                jq -e 'any(.hooks.PostToolUse[]?.hooks[]?; .command | test("post-tool-use-edit"))' "$SETTINGS" >/dev/null \
                  || { echo "::error::Missing T6 PostToolUse post-tool-use-edit entry"; exit 1; }
                # UserPromptSubmit + Stop hooks present.
                [ "$(jq -r '.hooks.UserPromptSubmit | length' "$SETTINGS")" = "1" ] \
                  || { echo "::error::Missing T5 UserPromptSubmit entry"; exit 1; }
                [ "$(jq -r '.hooks.Stop | length' "$SETTINGS")" = "1" ] \
                  || { echo "::error::Missing T7 Stop entry"; exit 1; }
                # statusLine wired.
                jq -e '.statusLine.command | test("adapters/claude/statusline")' "$SETTINGS" >/dev/null \
                  || { echo "::error::Missing T4 statusLine entry"; exit 1; }
              else
                echo "jq missing — settings.json content check skipped (file presence already verified)."
              fi
              echo "Claude adapter footprint + hook wiring: OK"
              ;;
            copilot-cli)
              for role in team-lead solution-architect ai-engineer frontend-engineer backend-engineer devops-engineer qa-engineer; do
                [ -f "$ROOT/.github/agents/${role}.agent.md" ] || { echo "::error::Missing .github/agents/${role}.agent.md"; exit 1; }
              done
              [ ! -f "$ROOT/.github/agents/project-manager.agent.md" ] || { echo "::error::Legacy project-manager.agent.md should not exist"; exit 1; }
              for skill in ginee-discovery ginee-rediscover ginee-pick-up ginee-triage ginee-file-bug ginee-file-feature ginee-file-framework-bug ginee-file-framework-feature ginee-promote-discussion ginee-reindex ginee-update; do
                [ -f "$ROOT/.agents/skills/${skill}/SKILL.md" ] || { echo "::error::Missing .agents/skills/${skill}/SKILL.md"; exit 1; }
              done
              echo "Copilot CLI adapter footprint: OK"
              ;;
            agents-md)
              [ -f "$ROOT/AGENTS.md" ] || { echo "::error::Missing AGENTS.md at project root"; exit 1; }
              echo "AGENTS.md adapter footprint: OK"
              ;;
            generic)
              [ -f "$ROOT/.agents/ginee/adapters/generic/INSTRUCTIONS.md" ] || { echo "::error::Missing generic INSTRUCTIONS.md"; exit 1; }
              echo "Generic adapter footprint: OK"
              ;;
          esac

      - name: Adopter content untouched
        run: |
          set -e
          ROOT=/tmp/fake-project
          # Pre-existing adopter files outside install dirs must be intact
          grep -qF "Fake project for ginee install smoke test" "$ROOT/README.md" || { echo "::error::adopter README.md was modified"; exit 1; }
          grep -qF "Placeholder." "$ROOT/docs/architecture.md" || { echo "::error::adopter docs/architecture.md was modified"; exit 1; }
          grep -qF "First example task" "$ROOT/TODO.md" || { echo "::error::adopter TODO.md was modified"; exit 1; }
          echo "Adopter content preserved: OK"

      - name: Brand consistency in installed framework files
        run: |
          set -e
          ROOT=/tmp/fake-project/.agents/ginee
          # Allowlist same as the source repo's brand check (legacy migration contexts)
          hits=$(grep -rn "engineering-team" "$ROOT" 2>/dev/null \
            | grep -v "MIGRATIONS/\|CLAUDE\.md.*D8\|CLAUDE\.md.*D11\|PLAN\.md.*D8\|PLAN\.md.*D11\|migrate-engineering-team-to-ginee" \
            | grep -v -i "legacy\|pre-rebrand\|migrating\|migrate legacy\|auto-rename\|rename once\|legacy install path\|legacy-path migration\|engineering team framework" \
            || true)
          if [ -n "$hits" ]; then
            echo "::error::Stray 'engineering-team' references in installed framework files:"
            echo "$hits"
            exit 1
          fi
          echo "Installed brand consistency: OK"

      - name: Update-only preserves local/
        run: |
          set -e
          ROOT=/tmp/fake-project
          mkdir -p "$ROOT/.agents/ginee/local"
          echo "ADOPTER_SENTINEL_KEEP_ME" > "$ROOT/.agents/ginee/local/sentinel.txt"
          cat install.sh | bash -s -- \
            --target "$ROOT" \
            --adapter ${{ matrix.adapter }} \
            --ref pr-test \
            --repo /tmp/ginee-bare.git \
            --update-only
          grep -qF "ADOPTER_SENTINEL_KEEP_ME" "$ROOT/.agents/ginee/local/sentinel.txt" || { echo "::error::local/sentinel.txt lost or corrupted on --update-only"; exit 1; }
          # Regression — installer must not nest its temp-backup dir under local/ (see #25)
          if [ -d "$ROOT/.agents/ginee/local/local" ]; then
            echo "::error::Installer nested backup at .agents/ginee/local/local — restore should merge or skip, not copy-into-existing"
            exit 1
          fi
          stale=$(find "$ROOT/.agents/ginee/local" -maxdepth 1 -type d -name 'et-local-*' 2>/dev/null || true)
          if [ -n "$stale" ]; then
            echo "::error::Installer left stale backup dir(s) under local/: $stale"
            exit 1
          fi
          echo "Update-only preserved local/: OK"

  install-smoke-pwsh:
    name: Install smoke (pwsh, ${{ matrix.adapter }})
    needs: validate
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        adapter: [claude, copilot-cli, agents-md, generic]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up local bare repo
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git init --bare C:\temp\ginee-bare.git
          git -c protocol.file.allow=always push --force C:\temp\ginee-bare.git HEAD:refs/heads/pr-test

      - name: Scaffold fake adopter project
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path C:\temp\fake-project | Out-Null
          Set-Location C:\temp\fake-project
          git init -q
          git config user.email ci@example.com
          git config user.name "CI"
          New-Item -ItemType Directory -Force -Path docs | Out-Null
          '# Fake project for ginee install smoke test' | Set-Content README.md
          "# Architecture`n`nPlaceholder." | Set-Content docs/architecture.md
          "- [ ] First example task`n- [ ] Second example task" | Set-Content TODO.md
          git add . ; git commit -q -m "init"

      - name: Install via piped one-liner (recommended PowerShell pattern)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:GINEE_TARGET = 'C:\temp\fake-project'
          $env:GINEE_ADAPTER = '${{ matrix.adapter }}'
          $env:GINEE_REF = 'pr-test'
          $env:GINEE_REPO = 'C:\temp\ginee-bare.git'
          # Mirrors README `iwr ... | iex`; substitutes network fetch with workspace install.ps1.
          Get-Content $env:GITHUB_WORKSPACE\install.ps1 -Raw | iex

      - name: Verify framework layout
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = 'C:\temp\fake-project'
          $required = 'core','core\roles','core\templates','core\skills','adapters','adapters\_shared\agents','extras\roles','local'
          foreach ($d in $required) {
            if (-not (Test-Path "$root\.agents\ginee\$d")) {
              Write-Error "Missing $root\.agents\ginee\$d"
            }
          }
          if (-not (Test-Path "$root\.agents\ginee\core\VERSION")) { Write-Error "Missing core/VERSION" }
          # Only chosen adapter survives
          Get-ChildItem "$root\.agents\ginee\adapters" -Directory | ForEach-Object {
            if ($_.Name -ne '_shared' -and $_.Name -ne '${{ matrix.adapter }}') {
              Write-Error "Unchosen adapter '$($_.Name)' should have been pruned"
            }
          }
          Write-Host "Framework layout: OK"

      - name: Verify adapter footprint + no stale legacy pointers
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = 'C:\temp\fake-project'
          $adapter = '${{ matrix.adapter }}'
          $roles = 'team-lead','solution-architect','ai-engineer','frontend-engineer','backend-engineer','devops-engineer','qa-engineer'
          $skills = 'ginee-discovery','ginee-rediscover','ginee-pick-up','ginee-triage','ginee-file-bug','ginee-file-feature','ginee-file-framework-bug','ginee-file-framework-feature','ginee-promote-discussion','ginee-reindex','ginee-update'
          switch ($adapter) {
            'claude' {
              foreach ($r in $roles) {
                if (-not (Test-Path "$root\.claude\agents\$r.md")) { Write-Error "Missing .claude/agents/$r.md" }
              }
              if (Test-Path "$root\.claude\agents\project-manager.md") { Write-Error "Legacy project-manager.md pointer should not exist" }
              foreach ($s in $skills) {
                if (-not (Test-Path "$root\.claude\skills\$s\SKILL.md")) { Write-Error "Missing .claude/skills/$s/SKILL.md" }
              }
              if (-not (Select-String -Path "$root\CLAUDE.md" -SimpleMatch -Quiet '## Engineering team framework')) {
                Write-Error "CLAUDE.md missing pointer sentinel"
              }
              # Compliance playbook hooks — Tier 1 (T2/T3) + Tier 2 (T5/T6/T7/T8) + statusline (T4).
              $hookFiles = 'pre-tool-use-edit.ps1','pre-tool-use-edit.sh',
                           'pre-tool-use-bash.ps1','pre-tool-use-bash.sh',
                           'pre-tool-use-send-message.ps1','pre-tool-use-send-message.sh',
                           'post-tool-use-edit.ps1','post-tool-use-edit.sh',
                           'user-prompt-submit.ps1','user-prompt-submit.sh',
                           'stop.ps1','stop.sh',
                           'keyword-triggers.yaml','carry-forward-rules.yaml'
              foreach ($f in $hookFiles) {
                if (-not (Test-Path "$root\.agents\ginee\adapters\claude\hooks\$f")) {
                  Write-Error "Missing .agents/ginee/adapters/claude/hooks/$f"
                }
              }
              foreach ($f in 'statusline.ps1','statusline.sh') {
                if (-not (Test-Path "$root\.agents\ginee\adapters\claude\$f")) {
                  Write-Error "Missing .agents/ginee/adapters/claude/$f"
                }
              }
              foreach ($f in 'sync-claude-settings.ps1','sync-claude-settings.sh') {
                if (-not (Test-Path "$root\.agents\ginee\core\scripts\$f")) {
                  Write-Error "Missing .agents/ginee/core/scripts/$f"
                }
              }
              # .claude/settings.json must be auto-wired with all hook entries.
              $settings = "$root\.claude\settings.json"
              if (-not (Test-Path $settings)) { Write-Error "Missing .claude/settings.json (sync-claude-settings did not run)" }
              $cfg = Get-Content -Raw $settings | ConvertFrom-Json
              if ($cfg.hooks.PreToolUse.Count -ne 4) { Write-Error "Expected 4 PreToolUse entries, got $($cfg.hooks.PreToolUse.Count)" }
              $cmds = @($cfg.hooks.PreToolUse | ForEach-Object { $_.hooks[0].command })
              foreach ($marker in 'pre-tool-use-edit','pre-tool-use-bash','pre-tool-use-send-message','attest-optimized-by') {
                if (-not ($cmds | Where-Object { $_ -match $marker })) { Write-Error "Missing PreToolUse hook: $marker" }
              }
              if (-not ($cfg.hooks.PostToolUse[0].hooks | Where-Object { $_.command -match 'post-tool-use-edit' })) {
                Write-Error "Missing T6 PostToolUse post-tool-use-edit entry"
              }
              if ($cfg.hooks.UserPromptSubmit.Count -ne 1) { Write-Error "Missing T5 UserPromptSubmit entry" }
              if ($cfg.hooks.Stop.Count -ne 1) { Write-Error "Missing T7 Stop entry" }
              if ($cfg.statusLine.command -notmatch 'adapters/claude/statusline') {
                Write-Error "Missing T4 statusLine entry"
              }
              Write-Host "Claude adapter footprint + hook wiring: OK"
            }
            'copilot-cli' {
              foreach ($r in $roles) {
                if (-not (Test-Path "$root\.github\agents\$r.agent.md")) { Write-Error "Missing .github/agents/$r.agent.md" }
              }
              if (Test-Path "$root\.github\agents\project-manager.agent.md") { Write-Error "Legacy project-manager.agent.md should not exist" }
              foreach ($s in $skills) {
                if (-not (Test-Path "$root\.agents\skills\$s\SKILL.md")) { Write-Error "Missing .agents/skills/$s/SKILL.md" }
              }
              Write-Host "Copilot CLI adapter footprint: OK"
            }
            'agents-md' {
              if (-not (Test-Path "$root\AGENTS.md")) { Write-Error "Missing AGENTS.md at project root" }
              Write-Host "AGENTS.md adapter footprint: OK"
            }
            'generic' {
              if (-not (Test-Path "$root\.agents\ginee\adapters\generic\INSTRUCTIONS.md")) { Write-Error "Missing generic INSTRUCTIONS.md" }
              Write-Host "Generic adapter footprint: OK"
            }
          }

      - name: Adopter content untouched
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = 'C:\temp\fake-project'
          if (-not (Select-String -Path "$root\README.md" -SimpleMatch -Quiet 'Fake project for ginee install smoke test')) { Write-Error "adopter README.md was modified" }
          if (-not (Select-String -Path "$root\docs\architecture.md" -SimpleMatch -Quiet 'Placeholder.')) { Write-Error "adopter docs/architecture.md was modified" }
          if (-not (Select-String -Path "$root\TODO.md" -SimpleMatch -Quiet 'First example task')) { Write-Error "adopter TODO.md was modified" }
          Write-Host "Adopter content preserved: OK"

      - name: Update-only preserves local/
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = 'C:\temp\fake-project'
          New-Item -ItemType Directory -Force -Path "$root\.agents\ginee\local" | Out-Null
          'ADOPTER_SENTINEL_KEEP_ME' | Set-Content "$root\.agents\ginee\local\sentinel.txt"
          $env:GINEE_TARGET = $root
          $env:GINEE_ADAPTER = '${{ matrix.adapter }}'
          $env:GINEE_REF = 'pr-test'
          $env:GINEE_REPO = 'C:\temp\ginee-bare.git'
          $env:GINEE_UPDATE_ONLY = '1'
          Get-Content $env:GITHUB_WORKSPACE\install.ps1 -Raw | iex
          if (-not (Select-String -Path "$root\.agents\ginee\local\sentinel.txt" -SimpleMatch -Quiet 'ADOPTER_SENTINEL_KEEP_ME')) {
            Write-Error "local/sentinel.txt lost or corrupted on --update-only"
          }
          # Regression — installer must not nest its temp-backup dir under local/ (see #25)
          $stale = Get-ChildItem "$root\.agents\ginee\local" -Directory -Filter 'et-local-*' -ErrorAction SilentlyContinue
          if ($stale) {
            Write-Error "Installer left stale backup dir(s) under local/: $(($stale | ForEach-Object FullName) -join ', ')"
          }
          if (Test-Path "$root\.agents\ginee\local\local") {
            Write-Error "Installer nested backup at .agents/ginee/local/local — restore should merge or skip, not copy-into-existing"
          }
          Write-Host "Update-only preserved local/: OK"

  install-smoke-tarball-bash:
    # Exercises the release-tarball path (no --repo override, --ref latest)
    # against the real published GitHub Release. Verifies the tarball flow
    # works end-to-end without git on PATH for the common adopter scenario.
    name: Install smoke tarball (bash)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scaffold fake adopter project
        run: |
          set -e
          mkdir -p /tmp/fake-tarball
          cd /tmp/fake-tarball
          git init -q
          git config user.email ci@example.com
          git config user.name "CI"
          printf '# Fake project for ginee tarball-path smoke test\n' > README.md
          git add . && git commit -q -m "init"

      - name: Install via tarball path (--ref latest, no --repo override)
        run: |
          set -e
          cat install.sh | bash -s -- --target /tmp/fake-tarball --adapter claude --ref latest

      - name: Verify framework layout + claude adapter footprint
        run: |
          set -e
          ROOT=/tmp/fake-tarball
          for d in core core/roles core/templates core/skills adapters adapters/_shared/agents extras/roles local; do
            [ -d "$ROOT/.agents/ginee/$d" ] || { echo "::error::Missing $ROOT/.agents/ginee/$d"; exit 1; }
          done
          [ -f "$ROOT/.agents/ginee/core/VERSION" ] || { echo "::error::Missing core/VERSION"; exit 1; }
          for role in team-lead solution-architect ai-engineer frontend-engineer backend-engineer devops-engineer qa-engineer; do
            [ -f "$ROOT/.claude/agents/${role}.md" ] || { echo "::error::Missing .claude/agents/${role}.md"; exit 1; }
          done
          for skill in ginee-discovery ginee-rediscover ginee-pick-up ginee-triage ginee-file-bug; do
            [ -f "$ROOT/.claude/skills/${skill}/SKILL.md" ] || { echo "::error::Missing .claude/skills/${skill}/SKILL.md"; exit 1; }
          done
          grep -qF "## Engineering team framework" "$ROOT/CLAUDE.md" || { echo "::error::CLAUDE.md missing pointer sentinel"; exit 1; }
          echo "Tarball-path install: OK"

  install-smoke-tarball-pwsh:
    name: Install smoke tarball (pwsh)
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scaffold fake adopter project
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path C:\temp\fake-tarball | Out-Null
          Set-Location C:\temp\fake-tarball
          git init -q
          git config user.email ci@example.com
          git config user.name "CI"
          '# Fake project for ginee tarball-path smoke test' | Set-Content README.md
          git add . ; git commit -q -m "init"

      - name: Install via tarball path (iex pattern, no GINEE_REPO override)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:GINEE_TARGET = 'C:\temp\fake-tarball'
          $env:GINEE_ADAPTER = 'claude'
          $env:GINEE_REF = 'latest'
          # Mirrors README `iwr ... | iex`; substitutes network fetch with workspace install.ps1.
          Get-Content $env:GITHUB_WORKSPACE\install.ps1 -Raw | iex

      - name: Verify framework layout + claude adapter footprint
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = 'C:\temp\fake-tarball'
          $required = 'core','core\roles','core\templates','core\skills','adapters','adapters\_shared\agents','extras\roles','local'
          foreach ($d in $required) {
            if (-not (Test-Path "$root\.agents\ginee\$d")) { Write-Error "Missing $root\.agents\ginee\$d" }
          }
          if (-not (Test-Path "$root\.agents\ginee\core\VERSION")) { Write-Error "Missing core/VERSION" }
          $roles = 'team-lead','solution-architect','ai-engineer','frontend-engineer','backend-engineer','devops-engineer','qa-engineer'
          foreach ($r in $roles) {
            if (-not (Test-Path "$root\.claude\agents\$r.md")) { Write-Error "Missing .claude/agents/$r.md" }
          }
          $skills = 'ginee-discovery','ginee-rediscover','ginee-pick-up','ginee-triage','ginee-file-bug'
          foreach ($s in $skills) {
            if (-not (Test-Path "$root\.claude\skills\$s\SKILL.md")) { Write-Error "Missing .claude/skills/$s/SKILL.md" }
          }
          if (-not (Select-String -Path "$root\CLAUDE.md" -SimpleMatch -Quiet '## Engineering team framework')) {
            Write-Error "CLAUDE.md missing pointer sentinel"
          }
          Write-Host "Tarball-path install: OK"

      - name: Regression — scope-leak fix (pre-set $Ref=$null in session)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Remove-Item -Recurse -Force C:\temp\scope-leak -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force C:\temp\scope-leak | Out-Null
          Set-Location C:\temp\scope-leak
          git init -q
          git config user.email ci@example.com
          git config user.name "CI"
          'init' | Set-Content README.md
          git add . ; git commit -q -m "init"
          # Simulate the bug scenario: $Ref / $Target empty in caller scope before iex
          $Ref = $null
          $Target = $null
          $env:GINEE_TARGET = 'C:\temp\scope-leak'
          $env:GINEE_ADAPTER = 'claude'
          Remove-Item env:GINEE_REF -ErrorAction SilentlyContinue
          # Should normalize $Ref to 'latest' and succeed via the tarball path,
          # not throw "The filename, directory name, or volume label syntax is incorrect."
          Get-Content $env:GITHUB_WORKSPACE\install.ps1 -Raw | iex
          if (-not (Test-Path 'C:\temp\scope-leak\.agents\ginee\core\VERSION')) {
            Write-Error "Scope-leak regression: install did not complete"
          }
          Write-Host "Scope-leak regression cover: OK"
