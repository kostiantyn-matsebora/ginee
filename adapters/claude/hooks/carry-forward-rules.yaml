# ginee — T8 (#144) per-cardinal carry-forward rules for SendMessage continuations.
# Schema: per-target-name lookup. One rule line per cardinal.
# The hook checks SendMessage continuation messages contain `[carry-forward]`
# as a leading anchor; if missing, it blocks (exit 2) and the stderr remediation
# cites the cardinal's rule from this table.
#
# Format: `target: rule` — one rule per cardinal name.
# `target` is matched against the SendMessage payload's target/recipient field
# (case-insensitive substring); first match wins.

